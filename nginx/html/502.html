<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Uh Oh - MDFT Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Inter", Arial, Helvetica, sans-serif;
      }
      body {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        background-color: #fff;
      }
      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .error-card {
        max-width: 480px;
        width: 100%;
        text-align: center;
        padding: 3rem 2rem;
      }
      .robot-wrapper {
        margin-bottom: 2rem;
        /* Gentle rocking animation to suggest it's "out" */
        animation: slump 3s ease-in-out infinite;
        display: inline-block;
      }
      @keyframes slump {
        0%, 100% { transform: rotate(-3deg); }
        50%       { transform: rotate(3deg); }
      }
      .error-title {
        font-size: 3rem;
        font-weight: 900;
        color: #212529;
        margin-bottom: 0.5rem;
        letter-spacing: -0.03em;
      }
      .error-subtitle {
        font-size: 1.25rem;
        font-weight: 500;
        color: #212529;
        margin-bottom: 1rem;
      }
      .error-detail {
        font-size: 0.85rem;
        color: #6c757d;
      }
      .divider {
        width: 48px;
        height: 4px;
        background-color: #fa6915;
        border-radius: 2px;
        margin: 1.25rem auto;
      }
      .navbar-brand img {
        height: 52px;
      }
      .navbar a {
        font-size: 1.3rem;
        font-weight: 400;
        color: black !important;
        text-decoration: none;
      }
      footer {
        background-color: #212529;
        color: #f8f9fa;
        padding: 1.5rem 0;
        font-size: 0.85rem;
        text-align: center;
      }
    </style>
  </head>
  <body class="bg-white">
    <!-- Navbar -->
    <div class="container" style="max-width: 960px;">
      <nav class="navbar navbar-expand-lg navbar-white bg-white">
        <a class="navbar-brand d-flex align-items-center" href="/">
          <img height="52" src="/error/logo.png" alt="MDFT LMS" />
        </a>
      </nav>
    </div>

    <!-- Main content -->
    <main class="container">
      <div class="error-card mx-auto">
        <div class="robot-wrapper">
          <img src="/error/robot-offline.svg" alt="Unconscious robot" width="200" height="240" />
        </div>

        <h1 class="error-title">Uh Oh</h1>

        <div class="divider"></div>

        <p class="error-subtitle">The page could not be loaded</p>

        <p class="error-detail">Deno upstream is offline</p>
      </div>
    </main>

    <!-- Footer -->
    <footer>
      <p class="mb-0">&copy; 2025 MDFT Pro. All rights reserved.</p>
    </footer>
  </body>
</html>
