services:
  nginx:
    image: docker.io/nginx:alpine
    container_name: mdft-lms-nginx
    ports:
      - "8080:80"
      # - "8443:443"  # Enable with TLS
    volumes:
      # Configuration
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro,z
      - ./nginx/conf.d:/etc/nginx/conf.d:ro,z
      - ./nginx/includes:/etc/nginx/includes:ro,z

      # Data directories
      - ./nginx/cache:/var/cache/nginx:Z
      - ./nginx/videos:/var/videos:ro,Z  # Video files (read-only)
      - ./nginx/media:/var/media:ro,Z   # Media files (read-only)

      # Logs (optional: persist or use journald)
      - ./nginx/logs:/var/log/nginx:Z

    restart: unless-stopped
