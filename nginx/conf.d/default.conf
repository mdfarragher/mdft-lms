# Upstream definitions
upstream deno_backend {
    server host.containers.internal:8123;
    keepalive 32;
}

# Main server block
server {
    listen 80;
    listen [::]:80;

    # Adjust for your domain
    server_name localhost _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ============================================
    # Video Authentication Subrequest
    # ============================================
    location = /_auth {
        internal;

        proxy_pass http://deno_backend/api/video-auth;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Strip original request body, pass only headers
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";

        # Pass video ID — stored in $video_id by the /video/ location below
        proxy_set_header X-Video-ID $video_id;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Real-IP $remote_addr;

        # Forward the original cookie so Deno can authenticate the user
        proxy_set_header Cookie $http_cookie;

        # Timeout for auth check (keep short)
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;

        # Cache auth responses briefly to reduce Deno load
        proxy_cache auth_cache;
        proxy_cache_valid 200 10s;
        proxy_cache_key "$http_cookie$video_id";
    }

    # ============================================
    # VIDEO ROUTES: /video/[id] with auth_request
    # ============================================
    location ~ ^/video/([a-f0-9-]+)$ {
        # Capture the UUID into a variable accessible by /_auth
        set $video_id $1;

        # Rate limiting
        limit_req zone=video_auth burst=10 nodelay;
        limit_conn video_conn 2;  # Max 2 concurrent streams per IP

        # Authentication subrequest to Deno
        auth_request /_auth;

        # Capture video path from Deno's response header
        auth_request_set $video_path $upstream_http_x_video_path;
        auth_request_set $video_filename $upstream_http_x_video_filename;

        # Serve the file using the path returned by Deno
        alias /var/videos/$video_path;

        # Enable proper streaming with range requests
        add_header Accept-Ranges bytes;
        add_header Cache-Control "private, no-store, max-age=0";

        # Handle errors from auth_request
        error_page 401 = @auth_required;
        error_page 403 = @forbidden;
        error_page 404 = @not_found;
    }

    # Error handlers
    location @auth_required {
        return 401 '{"error":"Authentication required"}';
    }

    location @forbidden {
        return 403 '{"error":"Access denied"}';
    }

    location @not_found {
        return 404 '{"error":"Video not found"}';
    }

    # ============================================
    # MEDIA ROUTES: /media served directly by nginx
    # ============================================
    location /media/ {
        alias /var/media/;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ============================================
    # ALL OTHER ROUTES: Proxy to Deno/Fresh
    # ============================================
    location / {
        # Rate limiting for API
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://deno_backend;
        proxy_http_version 1.1;

        # WebSocket support (for Fresh dev HMR or real-time features)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering (disable for streaming responses if needed)
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # Cache static assets from Deno
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://deno_backend;
            proxy_cache static_cache;
            proxy_cache_valid 200 1h;
            proxy_cache_use_stale error timeout updating;
            expires 1h;
        }
    }

    # Health check endpoint (bypass auth)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ============================================
    # CUSTOM ERROR PAGES
    # ============================================
    error_page 500 /500.html;
    error_page 502 /502.html;

    location = /500.html {
        root /etc/nginx/html;
        internal;
    }

    location = /502.html {
        root /etc/nginx/html;
        internal;
    }

    # Serve static assets referenced by the error page (robot SVG, logo)
    location /error/ {
        alias /etc/nginx/html/;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
}

# Proxy cache definitions
proxy_cache_path /var/cache/nginx/auth levels=1:2 keys_zone=auth_cache:10m max_size=100m inactive=30s;
proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=static_cache:50m max_size=500m inactive=1h;
